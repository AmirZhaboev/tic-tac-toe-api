<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Крестики-Нолики</title>
    <style>
        body {
          font-family: Arial, sans-serif;
          text-align: center;
          background: #f9f9f9;
        }

        h1 {
          color: #333;
        }

        .board {
          display: grid;
          grid-template-columns: repeat(3, 100px);
          gap: 5px;
          justify-content: center;
          margin-top: 10px;
        }

        .cell {
          width: 100px;
          height: 100px;
          background: white;
          border: 2px solid #333;
          font-size: 48px;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
        }

        button {
          margin-top: 20px;
          padding: 10px 20px;
          font-size: 16px;
          cursor: pointer;
        }

        .game-container {
          border: 2px solid #ccc;
          padding: 10px;
          margin: 15px auto;
          width: max-content;
          background: #fff;
          border-radius: 8px;
          box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .status {
          margin-top: 10px;
          font-size: 16px;
        }
    </style>
</head>
<body>
<h1>Крестики-Нолики</h1>
<button id="newGame">Новая игра</button>
<div id="games-container"></div>

<script src="script.js"></script>
</body>
</html>
